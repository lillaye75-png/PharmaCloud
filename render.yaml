services:
  - type: web
    name: pharmacloud-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacloud-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://pharmacloud-frontend.onrender.com

  - type: web
    name: pharmacloud-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://pharmacloud-backend.onrender.com/api/v1

databases:
  - name: pharmacloud-db
    plan: free
    region: frankfurt
    databaseName: pharmacloud
    ipAllowList: []
